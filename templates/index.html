<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoNovel - AI小説生成</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ===== スタート画面 ===== -->
  <div id="start-screen" class="screen active">
    <div class="container center">
      <div class="logo-area">
        <span class="logo-icon">📖</span>
        <h1 class="app-title">AutoNovel</h1>
        <p class="app-subtitle">AIが紡ぐ、あなただけの物語</p>
      </div>
      <p class="description">
        いくつかの質問に答えるだけで、<br />
        AIがオリジナルの小説を自動生成します
      </p>
      <button class="btn-primary" id="start-btn">はじめる →</button>
    </div>
  </div>

  <!-- ===== 質問画面 ===== -->
  <div id="question-screen" class="screen">
    <div class="container">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-text" id="progress-text">1 / 6</span>
      </div>

      <div class="question-card" id="question-card">
        <p class="question-step" id="question-step">質問 1</p>
        <h2 class="question-text" id="question-text"></h2>
        <div class="options-grid" id="options-grid"></div>
      </div>

      <div class="nav-buttons">
        <button class="btn-secondary" id="prev-btn">← 戻る</button>
      </div>
    </div>
  </div>

  <!-- ===== ローディング画面 ===== -->
  <div id="loading-screen" class="screen">
    <div class="container center">
      <span class="loading-icon">✍️</span>
      <h2 class="loading-title">小説を執筆中...</h2>
      <p class="loading-status" id="loading-status">AIが物語を構想しています</p>
      <div class="dot-loader">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="result-screen" class="screen">
    <div class="container wide">
      <div class="result-header">
        <h2 class="result-title">✨ 小説が完成しました</h2>
        <div class="result-actions">
          <button class="btn-icon" id="copy-btn">📋 コピー</button>
          <button class="btn-icon" id="download-btn">💾 保存</button>
          <button class="btn-secondary" id="restart-btn">🔄 もう一度</button>
        </div>
      </div>
      <div class="novel-container">
        <div class="novel-content" id="novel-content"></div>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = {{ questions | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
